<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top-Down Racer v02 — Code Map</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;

    --engine: #3b82f6;
    --engine-bg: rgba(59,130,246,0.08);
    --renderer: #10b981;
    --renderer-bg: rgba(16,185,129,0.08);
    --ai: #a855f7;
    --ai-bg: rgba(168,85,247,0.08);
    --tracks: #f97316;
    --tracks-bg: rgba(249,115,22,0.08);
    --other: #6b7280;
    --other-bg: rgba(107,114,128,0.08);
    --entry: #eab308;
    --entry-bg: rgba(234,179,8,0.08);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* ─── Sidebar ─── */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    z-index: 10;
  }

  .sidebar h1 {
    font-size: 14px;
    padding: 16px 16px 4px;
    color: var(--accent);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .sidebar h2 {
    font-size: 11px;
    padding: 12px 16px 6px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .search-box {
    margin: 8px 12px;
    padding: 6px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    width: calc(100% - 24px);
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-dim); }

  /* Layer toggles */
  .layer-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 16px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  .layer-toggle:hover { background: rgba(255,255,255,0.04); }
  .layer-toggle input { display: none; }
  .layer-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px currentColor;
  }
  .layer-toggle.off .layer-label { color: var(--text-dim); text-decoration: line-through; }
  .layer-toggle .layer-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  /* Presets */
  .preset-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 4px 12px 8px;
  }
  .preset-btn {
    padding: 4px 10px;
    font-size: 11px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .preset-btn:hover { border-color: var(--accent); color: var(--text); }
  .preset-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    padding: 6px 12px 12px;
  }
  .stat-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    text-align: center;
  }
  .stat-card .val {
    font-size: 18px;
    font-weight: 700;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .stat-card .lbl {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  /* Comments */
  .comments-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 12px 12px;
  }
  .comment-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    margin-bottom: 6px;
    font-size: 12px;
    position: relative;
  }
  .comment-item .target {
    font-weight: 600;
    color: var(--accent);
    font-size: 11px;
  }
  .comment-item .body {
    margin-top: 4px;
    color: var(--text-dim);
    line-height: 1.4;
  }
  .comment-item .del-btn {
    position: absolute;
    top: 6px;
    right: 8px;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 2px;
  }
  .comment-item .del-btn:hover { color: #f85149; }

  .empty-comments {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    padding: 20px 0;
    font-style: italic;
  }

  /* ─── Main Area ─── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  canvas#graph {
    flex: 1;
    display: block;
    cursor: grab;
  }
  canvas#graph.grabbing { cursor: grabbing; }

  /* Tooltip */
  .tooltip {
    position: absolute;
    background: #1c2128;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    max-width: 320px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 20;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .tooltip.visible { opacity: 1; }
  .tooltip .tt-title {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 2px;
  }
  .tooltip .tt-path {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'SF Mono', 'Fira Code', monospace;
    margin-bottom: 6px;
  }
  .tooltip .tt-desc {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.4;
    margin-bottom: 6px;
  }
  .tooltip .tt-exports {
    font-size: 11px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: #7ee787;
    line-height: 1.5;
    max-height: 100px;
    overflow-y: auto;
  }

  /* Comment modal */
  .modal-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 30;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    width: 380px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }
  .modal h3 {
    font-size: 14px;
    margin-bottom: 4px;
  }
  .modal .modal-path {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'SF Mono', 'Fira Code', monospace;
    margin-bottom: 12px;
  }
  .modal textarea {
    width: 100%;
    height: 80px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    padding: 8px 10px;
    resize: vertical;
    outline: none;
    font-family: inherit;
  }
  .modal textarea:focus { border-color: var(--accent); }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 10px;
  }
  .modal-actions button {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    transition: all 0.15s;
  }
  .modal-actions .save-btn { background: var(--accent); color: #000; border-color: var(--accent); }
  .modal-actions .save-btn:hover { filter: brightness(1.15); }
  .modal-actions button:hover { border-color: var(--accent); }

  /* Zoom controls */
  .zoom-controls {
    position: absolute;
    bottom: 16px;
    right: 16px;
    display: flex;
    gap: 4px;
    z-index: 10;
  }
  .zoom-btn {
    width: 32px;
    height: 32px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .zoom-btn:hover { border-color: var(--accent); background: #1c2128; }

  /* Legend */
  .legend {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: rgba(22,27,34,0.92);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    z-index: 10;
    display: flex;
    gap: 14px;
    font-size: 11px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Prompt bar */
  .prompt-bar {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 48px;
  }
  .prompt-text {
    flex: 1;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'SF Mono', 'Fira Code', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
    max-height: 40px;
    overflow-y: auto;
    white-space: pre-wrap;
  }
  .copy-btn {
    padding: 6px 14px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: filter 0.15s;
  }
  .copy-btn:hover { filter: brightness(1.15); }

  /* Edge type legend inline in sidebar */
  .edge-legend {
    padding: 4px 16px 8px;
    font-size: 11px;
  }
  .edge-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 2px 0;
    color: var(--text-dim);
  }
  .edge-line {
    width: 20px;
    height: 2px;
    border-radius: 1px;
    flex-shrink: 0;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 12px;
  }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <h1>Code Map</h1>
  <p style="padding: 2px 16px 0; font-size: 11px; color: var(--text-dim);">Top-Down Racer v02</p>

  <input class="search-box" id="search" type="text" placeholder="Search files..." />

  <h2>Layers</h2>
  <div id="layer-toggles"></div>

  <h2>Presets</h2>
  <div class="preset-row" id="presets"></div>

  <h2>Edge Types</h2>
  <div class="edge-legend" id="edge-legend"></div>

  <div class="divider"></div>

  <h2>Stats</h2>
  <div class="stats-grid" id="stats"></div>

  <div class="divider"></div>

  <h2>Comments <span id="comment-count" style="color:var(--accent)"></span></h2>
  <div class="comments-list" id="comments"></div>
</div>

<!-- Main -->
<div class="main">
  <canvas id="graph"></canvas>

  <!-- Tooltip -->
  <div class="tooltip" id="tooltip">
    <div class="tt-title"></div>
    <div class="tt-path"></div>
    <div class="tt-desc"></div>
    <div class="tt-exports"></div>
  </div>

  <!-- Zoom -->
  <div class="zoom-controls">
    <button class="zoom-btn" onclick="zoomIn()">+</button>
    <button class="zoom-btn" onclick="zoomOut()">&minus;</button>
    <button class="zoom-btn" onclick="zoomReset()" style="font-size:11px">1:1</button>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--engine)"></div>Engine</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--renderer)"></div>Renderer</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--ai)"></div>AI</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--tracks)"></div>Tracks</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--other)"></div>Types/Utils</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--entry)"></div>Entry</div>
  </div>

  <!-- Comment modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3 id="modal-title"></h3>
      <div class="modal-path" id="modal-path"></div>
      <textarea id="modal-text" placeholder="Add your comment or feedback..."></textarea>
      <div class="modal-actions">
        <button onclick="closeModal()">Cancel</button>
        <button class="save-btn" onclick="saveComment()">Save</button>
      </div>
    </div>
  </div>

  <!-- Prompt -->
  <div class="prompt-bar">
    <div class="prompt-text" id="prompt-text">Click nodes to add comments. Toggle layers to explore the architecture.</div>
    <button class="copy-btn" id="copy-btn" onclick="copyPrompt()">Copy Prompt</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════════

const LAYERS = {
  engine:   { label: 'Engine',      color: '#3b82f6', bg: 'rgba(59,130,246,0.06)' },
  renderer: { label: 'Renderer',    color: '#10b981', bg: 'rgba(16,185,129,0.06)' },
  ai:       { label: 'AI Bridge',   color: '#a855f7', bg: 'rgba(168,85,247,0.06)' },
  tracks:   { label: 'Tracks',      color: '#f97316', bg: 'rgba(249,115,22,0.06)' },
  other:    { label: 'Types/Utils', color: '#6b7280', bg: 'rgba(107,114,128,0.06)' },
  entry:    { label: 'Entry',       color: '#eab308', bg: 'rgba(234,179,8,0.06)' },
};

const EDGE_TYPES = {
  internal:  { label: 'Internal (same layer)', color: 'rgba(255,255,255,0.15)', dash: [] },
  cross:     { label: 'Cross-layer',           color: 'rgba(88,166,255,0.3)',    dash: [6,4] },
  external:  { label: 'External lib',          color: 'rgba(107,114,128,0.2)',   dash: [3,3] },
};

// Node positions — hand-tuned logical layout
// Engine cluster: left
// Renderer cluster: center-right
// AI cluster: bottom-left
// Tracks: far right
// Other + Entry: top

const NW = 130, NH = 38;

const nodes = [
  // ─── Entry ───
  { id: 'main', label: 'main.ts', path: 'src/main.ts', layer: 'entry',
    desc: 'Application entry point',
    exports: ['default entry'],
    x: 580, y: 30 },

  // ─── Engine ───
  { id: 'e-types', label: 'types.ts', path: 'src/engine/types.ts', layer: 'engine',
    desc: 'Core type contracts for the entire engine',
    exports: ['Vec2','Input','CarState','SmoothedInput','Surface','TrackControlPoint','TrackState','Checkpoint','CollisionResult','TimingState','WorldState','ArcLengthTable'],
    x: 60, y: 120 },
  { id: 'e-constants', label: 'constants.ts', path: 'src/engine/constants.ts', layer: 'engine',
    desc: 'Physics tuning & configuration constants',
    exports: ['DT','CAR','TIRE','SURFACE_GRIP','SURFACE_SPEED','INPUT_RATES','STEER','WALL_FRICTION'],
    x: 210, y: 120 },
  { id: 'e-vec2', label: 'vec2.ts', path: 'src/engine/vec2.ts', layer: 'engine',
    desc: 'Pure 2D vector math functions',
    exports: ['vec2()','add()','sub()','scale()','dot()','cross()','length()','normalize()','rotate()','distance()','lerp()','perpCW()','perpCCW()','fromAngle()'],
    x: 60, y: 190 },
  { id: 'e-spline', label: 'spline.ts', path: 'src/engine/spline.ts', layer: 'engine',
    desc: 'Catmull-Rom spline evaluation & arc-length parameterization',
    exports: ['catmullRomPoint()','catmullRomTangent()','buildArcLengthTable()','paramAtDistance()','pointAtDistance()','tangentAtDistance()'],
    x: 60, y: 260 },
  { id: 'e-car', label: 'car.ts', path: 'src/engine/car.ts', layer: 'engine',
    desc: 'Arcade bicycle physics model',
    exports: ['createInitialCarState()','smoothInput()','stepCar()','tireForce()'],
    x: 210, y: 190 },
  { id: 'e-track', label: 'track.ts', path: 'src/engine/track.ts', layer: 'engine',
    desc: 'Track geometry builder — boundaries, surfaces, surface detection',
    exports: ['buildTrack()','getSurface()','distanceToTrackCenter()','nearestBoundaryPoint()','WALL_OFFSET'],
    x: 210, y: 260 },
  { id: 'e-collision', label: 'collision.ts', path: 'src/engine/collision.ts', layer: 'engine',
    desc: 'Wall collision detection & resolution (swept + static)',
    exports: ['detectWallCollision()','resolveWallCollision()','pointToSegmentDistance()'],
    x: 60, y: 330 },
  { id: 'e-checkpoint', label: 'checkpoint.ts', path: 'src/engine/checkpoint.ts', layer: 'engine',
    desc: 'Lap timing & checkpoint gate tracking',
    exports: ['createInitialTimingState()','checkGateCrossing()','updateTiming()'],
    x: 210, y: 330 },
  { id: 'e-world', label: 'world.ts', path: 'src/engine/world.ts', layer: 'engine',
    desc: 'Main simulation orchestrator — wires physics pipeline each tick',
    exports: ['createWorld()','stepWorld()'],
    x: 135, y: 400 },
  { id: 'e-race', label: 'RaceController.ts', path: 'src/engine/RaceController.ts', layer: 'engine',
    desc: 'Game state machine: countdown, racing, paused, respawning, finished',
    exports: ['RaceController','GamePhase','RaceState','RaceAction','RaceControlSignals'],
    x: 300, y: 400 },

  // ─── Renderer ───
  { id: 'r-app', label: 'RendererApp.ts', path: 'src/renderer/RendererApp.ts', layer: 'renderer',
    desc: 'Root PixiJS application setup — initializes all subsystems',
    exports: ['RendererApp'],
    x: 530, y: 120 },
  { id: 'r-gameloop', label: 'GameLoop.ts', path: 'src/renderer/GameLoop.ts', layer: 'renderer',
    desc: 'Animation frame ticker, physics/render orchestration, AI integration',
    exports: ['GameLoop','RenderCallback','VsAiGraceState'],
    x: 530, y: 195 },
  { id: 'r-screen', label: 'ScreenManager.ts', path: 'src/renderer/ScreenManager.ts', layer: 'renderer',
    desc: 'Menu navigation & track/mode selection state machine',
    exports: ['ScreenManager'],
    x: 700, y: 120 },
  { id: 'r-world', label: 'WorldRenderer.ts', path: 'src/renderer/WorldRenderer.ts', layer: 'renderer',
    desc: 'Renders game world with interpolation & camera follow',
    exports: ['WorldRenderer'],
    x: 530, y: 270 },
  { id: 'r-track', label: 'TrackRenderer.ts', path: 'src/renderer/TrackRenderer.ts', layer: 'renderer',
    desc: 'Track graphics builder — roads, finish line, wall strokes',
    exports: ['buildTrackGraphics()','buildFinishLine()'],
    x: 700, y: 270 },
  { id: 'r-car', label: 'CarRenderer.ts', path: 'src/renderer/CarRenderer.ts', layer: 'renderer',
    desc: 'Player car visual (Indy formula aesthetic)',
    exports: ['CarRenderer'],
    x: 530, y: 340 },
  { id: 'r-aicar', label: 'AiCarRenderer.ts', path: 'src/renderer/AiCarRenderer.ts', layer: 'renderer',
    desc: 'AI opponent car visual (cyan)',
    exports: ['AiCarRenderer'],
    x: 700, y: 340 },
  { id: 'r-camera', label: 'CameraController.ts', path: 'src/renderer/CameraController.ts', layer: 'renderer',
    desc: 'Follow-cam logic with smooth pan',
    exports: ['CameraController'],
    x: 870, y: 270 },
  { id: 'r-hud', label: 'HudRenderer.ts', path: 'src/renderer/HudRenderer.ts', layer: 'renderer',
    desc: 'On-screen HUD: speedometer, lap counter, timing, minimap',

    x: 870, y: 195 },
  { id: 'r-overlay', label: 'OverlayRenderer.ts', path: 'src/renderer/OverlayRenderer.ts', layer: 'renderer',

    x: 870, y: 120 },
  { id: 'r-effects', label: 'EffectsRenderer.ts', path: 'src/renderer/EffectsRenderer.ts', layer: 'renderer',

    x: 870, y: 340 },
  { id: 'r-input', label: 'InputHandler.ts', path: 'src/renderer/InputHandler.ts', layer: 'renderer',

  { id: 'r-sound', label: 'SoundManager.ts', path: 'src/renderer/SoundManager.ts', layer: 'renderer',

    exports: ['SoundManager'],
    x: 1040, y: 120 },
  { id: 'r-leaderboard', label: 'Leaderboard.ts', path: 'src/renderer/Leaderboard.ts', layer: 'renderer',
    desc: 'Best lap tracking with localStorage persistence',
    exports: ['setHumanBest()','setAiBest()'],
    x: 1040, y: 195 },
  { id: 'r-menu', label: 'MainMenuScreen.ts', path: 'src/renderer/screens/MainMenuScreen.ts', layer: 'renderer',
    desc: 'Main menu UI screen',
    exports: ['MainMenuScreen'],
    x: 1040, y: 270 },
  { id: 'r-tselect', label: 'TrackSelectScreen.ts', path: 'src/renderer/screens/TrackSelectScreen.ts', layer: 'renderer',
    desc: 'Track + mode selection screen',
    exports: ['TrackSelectScreen'],
    x: 1040, y: 340 },
  { id: 'r-settings', label: 'SettingsScreen.ts', path: 'src/renderer/screens/SettingsScreen.ts', layer: 'renderer',
    desc: 'Settings menu (audio, controls)',
    exports: ['SettingsScreen'],
    x: 1040, y: 410 },

  // ─── AI ───
  { id: 'a-config', label: 'ai-config.ts', path: 'src/ai/ai-config.ts', layer: 'ai',
    desc: 'Ray casting, observation, and reward configuration constants',
    exports: ['RAY','OBS','RewardConfig','AiConfig','DEFAULT_AI_CONFIG'],
    x: 60, y: 510 },
  { id: 'a-raycaster', label: 'raycaster.ts', path: 'src/ai/raycaster.ts', layer: 'ai',
    desc: '9-ray forward arc sensor against track boundaries',
    exports: ['castRays()','raySegmentIntersection()'],

const state = {
  layers: { engine: true, renderer: true, ai: true, tracks: true, other: true, entry: true },
  edgeTypes: { internal: true, cross: true, external: true },
  search: '',
  selected: null,
  hovered: null,
  comments: [],
  pan: { x: 0, y: 0 },
  zoom: 1,
  drag: null,
  preset: 'all',
  animT: 0,
};

// Build lookup
const nodeMap = {};
nodes.forEach(n => nodeMap[n.id] = n);


// ═══════════════════════════════════════════════════════════════════
// CANVAS SETUP
// ═══════════════════════════════════════════════════════════════════

const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  render();
}
window.addEventListener('resize', resize);


// ═══════════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════════

function toScreen(wx, wy) {
  return {
    x: (wx + state.pan.x) * state.zoom + W / 2,
    y: (wy + state.pan.y) * state.zoom + H / 2,
  };
}

function toWorld(sx, sy) {
  return {
    x: (sx - W / 2) / state.zoom - state.pan.x,
    y: (sy - H / 2) / state.zoom - state.pan.y,
  };
}

function isNodeVisible(n) {
  if (!state.layers[n.layer]) return false;
  if (state.search) {
    const q = state.search.toLowerCase();
    if (!n.label.toLowerCase().includes(q) &&
        !n.path.toLowerCase().includes(q) &&
        !n.desc.toLowerCase().includes(q) &&
        !n.exports.some(e => e.toLowerCase().includes(q))) return false;
  }
  return true;
}

function getNodeColor(n) {
  return LAYERS[n.layer]?.color || '#6b7280';
}

function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();

  // Background
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  // Grid dots
  const gridSize = 50 * state.zoom;
  if (gridSize > 15) {
    ctx.fillStyle = 'rgba(48,54,61,0.5)';
    const ox = (state.pan.x * state.zoom + W / 2) % gridSize;
    const oy = (state.pan.y * state.zoom + H / 2) % gridSize;
    for (let x = ox; x < W; x += gridSize) {
      for (let y = oy; y < H; y += gridSize) {
        ctx.fillRect(x - 0.5, y - 0.5, 1, 1);
      }
    }
  }

  // Zone backgrounds
  drawZones();

  // Visible nodes/edges
  const visNodes = nodes.filter(isNodeVisible);
  const visNodeIds = new Set(visNodes.map(n => n.id));

  // Edges
  edges.forEach(e => {
    if (!state.edgeTypes[e.type]) return;
    if (!visNodeIds.has(e.from) || !visNodeIds.has(e.to)) return;
    drawEdge(e);
  });

  // Nodes
  visNodes.forEach(n => drawNode(n));

  ctx.restore();
}

function drawZones() {
  const zones = [
    { layer: 'engine',   x: 30,  y: 95,  w: 330, h: 335, label: 'ENGINE', sublabel: 'Pure Simulation' },
    { layer: 'renderer', x: 500, y: 95,  w: 600, h: 345, label: 'RENDERER', sublabel: 'PixiJS Visual Layer' },
    { layer: 'ai',       x: 30,  y: 485, w: 470, h: 195, label: 'AI BRIDGE', sublabel: 'Gymnasium Wrapper' },
    { layer: 'tracks',   x: 550, y: 435, w: 240, h: 180, label: 'TRACKS', sublabel: 'Track Definitions' },
  ];

  zones.forEach(z => {
    if (!state.layers[z.layer]) return;
    const p1 = toScreen(z.x, z.y);
    const p2 = toScreen(z.x + z.w, z.y + z.h);
    const sw = p2.x - p1.x;
    const sh = p2.y - p1.y;

    ctx.fillStyle = LAYERS[z.layer].bg;
    ctx.strokeStyle = LAYERS[z.layer].color + '18';
    ctx.lineWidth = 1;
    roundRect(ctx, p1.x, p1.y, sw, sh, 12 * state.zoom);
    ctx.fill();
    ctx.stroke();

    // Zone label
    const fontSize = Math.max(10, 14 * state.zoom);
    ctx.font = `700 ${fontSize}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
    ctx.fillStyle = LAYERS[z.layer].color + '30';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(z.label, p1.x + 10 * state.zoom, p1.y + 6 * state.zoom);
    const subSize = Math.max(8, 10 * state.zoom);
    ctx.font = `400 ${subSize}px -apple-system, sans-serif`;
    ctx.fillText(z.sublabel, p1.x + 10 * state.zoom, p1.y + (8 + fontSize) * state.zoom / state.zoom + 4 * state.zoom);
  });
}

function drawEdge(e) {
  const fromNode = nodeMap[e.from];
  const toNode = nodeMap[e.to];
  if (!fromNode || !toNode) return;

  const isHighlighted = state.selected &&
    (state.selected === e.from || state.selected === e.to);
  const isDimmed = state.selected && !isHighlighted;

  // Source & target centers
  const fx = fromNode.x + NW / 2;
  const fy = fromNode.y + NH / 2;
  const tx = toNode.x + NW / 2;
  const ty = toNode.y + NH / 2;

  // Edge exit/entry points (from edge of node)
  const p1 = toScreen(fx, fy);
  const p2 = toScreen(tx, ty);

  const dx = p2.x - p1.x;
  const dy = p2.y - p1.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist < 1) return;

  // Control point for curve
  const mx = (p1.x + p2.x) / 2;
  const my = (p1.y + p2.y) / 2;
  const perp = { x: -dy / dist * 20 * state.zoom, y: dx / dist * 20 * state.zoom };
  const cx1 = mx + perp.x * 0.5;
  const cy1 = my + perp.y * 0.5;

  // Style
  const edgeStyle = EDGE_TYPES[e.type] || EDGE_TYPES.internal;
  let alpha = isDimmed ? 0.04 : 1;
  if (isHighlighted) alpha = 1;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = isHighlighted ? getNodeColor(fromNode) + 'aa' : edgeStyle.color;
  ctx.lineWidth = isHighlighted ? 2.5 : 1.2;
  if (edgeStyle.dash.length) ctx.setLineDash(edgeStyle.dash.map(d => d * state.zoom));

  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y);
  ctx.quadraticCurveTo(cx1, cy1, p2.x, p2.y);
  ctx.stroke();
  ctx.setLineDash([]);

  // Arrowhead
  const arrowSize = (isHighlighted ? 8 : 6) * state.zoom;
  // Get tangent at end
  const t = 0.95;
  const ax = 2 * (1 - t) * (cx1 - p1.x) + 2 * t * (p2.x - cx1);
  const ay = 2 * (1 - t) * (cy1 - p1.y) + 2 * t * (p2.y - cy1);
  const al = Math.sqrt(ax * ax + ay * ay);
  if (al > 0) {
    const adx = ax / al;
    const ady = ay / al;
    const ex = p2.x;
    const ey = p2.y;
    ctx.fillStyle = isHighlighted ? getNodeColor(fromNode) + 'cc' : edgeStyle.color;
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex - adx * arrowSize - ady * arrowSize * 0.4, ey - ady * arrowSize + adx * arrowSize * 0.4);
    ctx.lineTo(ex - adx * arrowSize + ady * arrowSize * 0.4, ey - ady * arrowSize - adx * arrowSize * 0.4);
    ctx.closePath();
    ctx.fill();
  }

  // Animated flowing dot
  if (!isDimmed && state.zoom > 0.4) {
    const dotT = (state.animT * 0.3 + e.from.charCodeAt(1) * 0.1) % 1;
    const dotX = (1 - dotT) * (1 - dotT) * p1.x + 2 * (1 - dotT) * dotT * cx1 + dotT * dotT * p2.x;
    const dotY = (1 - dotT) * (1 - dotT) * p1.y + 2 * (1 - dotT) * dotT * cy1 + dotT * dotT * p2.y;
    const dotR = (isHighlighted ? 3 : 2) * state.zoom;
    ctx.fillStyle = isHighlighted ? getNodeColor(fromNode) : '#ffffff';
    ctx.globalAlpha = isHighlighted ? 0.9 : 0.3;
    ctx.beginPath();
    ctx.arc(dotX, dotY, dotR, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawNode(n) {
  const isSelected = state.selected === n.id;
  const isHovered = state.hovered === n.id;
  const isConnected = state.selected && edges.some(e =>
    (e.from === state.selected && e.to === n.id) ||
    (e.to === state.selected && e.from === n.id));
  const isDimmed = state.selected && !isSelected && !isConnected;
  const hasComment = state.comments.some(c => c.target === n.id);

  const p = toScreen(n.x, n.y);
  const w = NW * state.zoom;
  const h = NH * state.zoom;
  const color = getNodeColor(n);

  ctx.save();
  ctx.globalAlpha = isDimmed ? 0.15 : 1;

  // Glow
  if (isSelected || isHovered) {
    ctx.shadowColor = color;
    ctx.shadowBlur = isSelected ? 20 : 12;
  }

  // Body
  ctx.fillStyle = '#161b22';
  ctx.strokeStyle = isSelected ? color : (isHovered ? color + 'aa' : color + '55');
  ctx.lineWidth = isSelected ? 2.5 : (isHovered ? 2 : 1.2);
  roundRect(ctx, p.x, p.y, w, h, 6 * state.zoom);
  ctx.fill();
  ctx.stroke();

  ctx.shadowBlur = 0;

  // Color bar on left
  ctx.fillStyle = color;
  roundRectClip(ctx, p.x, p.y, 4 * state.zoom, h, 6 * state.zoom, 'left');
  ctx.fill();

  // Comment indicator
  if (hasComment) {
    ctx.fillStyle = '#f97316';
    ctx.beginPath();
    ctx.arc(p.x + w - 4 * state.zoom, p.y + 4 * state.zoom, 4 * state.zoom, 0, Math.PI * 2);
    ctx.fill();
  }

  // Text
  if (state.zoom > 0.35) {
    const fontSize = Math.max(8, 11 * state.zoom);
    ctx.font = `600 ${fontSize}px 'SF Mono', 'Fira Code', Consolas, monospace`;
    ctx.fillStyle = isSelected ? color : '#e6edf3';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    const textX = p.x + 8 * state.zoom;
    const textY = p.y + h / 2;
    ctx.fillText(truncText(ctx, n.label, w - 14 * state.zoom), textX, textY);
  }

  ctx.restore();
}

function truncText(ctx, text, maxW) {
  if (ctx.measureText(text).width <= maxW) return text;
  while (text.length > 1 && ctx.measureText(text + '...').width > maxW) text = text.slice(0, -1);
  return text + '...';
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function roundRectClip(ctx, x, y, w, h, r, side) {
  ctx.beginPath();
  if (side === 'left') {
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w, y);
    ctx.lineTo(x + w, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
  }
  ctx.closePath();
}


// ═══════════════════════════════════════════════════════════════════
// ANIMATION
// ═══════════════════════════════════════════════════════════════════

function animate() {
  state.animT += 0.008;
  if (state.animT > 100) state.animT -= 100;
  render();
  requestAnimationFrame(animate);
}


// ═══════════════════════════════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════════════════════════════

function hitTest(sx, sy) {
  const w = toWorld(sx, sy);
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    if (!isNodeVisible(n)) continue;
    if (w.x >= n.x && w.x <= n.x + NW && w.y >= n.y && w.y <= n.y + NH) return n;
  }
  return null;
}

canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;
  const hit = hitTest(sx, sy);

  if (hit && e.detail === 2) {
    // Double-click → comment
    openModal(hit);
    return;
  }

  if (hit) {
    state.selected = state.selected === hit.id ? null : hit.id;
    updatePrompt();
    render();
    return;
  }

  // Pan
  state.drag = { sx: e.clientX, sy: e.clientY, px: state.pan.x, py: state.pan.y };
  canvas.classList.add('grabbing');
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;

  if (state.drag) {
    const dx = (e.clientX - state.drag.sx) / state.zoom;
    const dy = (e.clientY - state.drag.sy) / state.zoom;
    state.pan.x = state.drag.px + dx;
    state.pan.y = state.drag.py + dy;
    return;
  }

  const hit = hitTest(sx, sy);
  const prev = state.hovered;
  state.hovered = hit ? hit.id : null;

  // Tooltip
  const tooltip = document.getElementById('tooltip');
  if (hit) {
    tooltip.querySelector('.tt-title').textContent = hit.label;
    tooltip.querySelector('.tt-path').textContent = hit.path;
    tooltip.querySelector('.tt-desc').textContent = hit.desc;
    tooltip.querySelector('.tt-exports').textContent = hit.exports.join(', ');
    tooltip.classList.add('visible');
    tooltip.style.left = Math.min(e.clientX - 280 + 20, W - 20) + 'px';
    tooltip.style.top = (e.clientY - rect.top + 20) + 'px';
    canvas.style.cursor = 'pointer';
  } else {
    tooltip.classList.remove('visible');
    canvas.style.cursor = 'grab';
  }
});

canvas.addEventListener('mouseup', () => {
  state.drag = null;
  canvas.classList.remove('grabbing');
});

canvas.addEventListener('mouseleave', () => {
  state.drag = null;
  state.hovered = null;
  document.getElementById('tooltip').classList.remove('visible');
  canvas.classList.remove('grabbing');
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;

  // Zoom toward cursor
  const wBefore = toWorld(sx, sy);
  const factor = e.deltaY > 0 ? 0.92 : 1.08;
  state.zoom = Math.max(0.2, Math.min(4, state.zoom * factor));
  const wAfter = toWorld(sx, sy);
  state.pan.x += wAfter.x - wBefore.x;
  state.pan.y += wAfter.y - wBefore.y;
}, { passive: false });


// ═══════════════════════════════════════════════════════════════════
// ZOOM CONTROLS
// ═══════════════════════════════════════════════════════════════════

function zoomIn() { state.zoom = Math.min(4, state.zoom * 1.25); }
function zoomOut() { state.zoom = Math.max(0.2, state.zoom * 0.8); }
function zoomReset() {
  state.zoom = 1;
  state.pan = { x: -350, y: -280 };
}


// ═══════════════════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════════════════

function buildSidebar() {
  // Layer toggles
  const layerDiv = document.getElementById('layer-toggles');
  layerDiv.innerHTML = '';
  Object.entries(LAYERS).forEach(([key, cfg]) => {
    const count = nodes.filter(n => n.layer === key).length;
    const div = document.createElement('div');
    div.className = 'layer-toggle' + (state.layers[key] ? '' : ' off');
    div.innerHTML = `
      <input type="checkbox" ${state.layers[key] ? 'checked' : ''} />
      <div class="layer-dot" style="color:${cfg.color}; background:${cfg.color}"></div>
      <span class="layer-label">${cfg.label}</span>
      <span class="layer-count">${count}</span>
    `;
    div.addEventListener('click', () => {
      state.layers[key] = !state.layers[key];
      buildSidebar();
      updatePrompt();
    });
    layerDiv.appendChild(div);
  });

  // Edge legend
  const edgeDiv = document.getElementById('edge-legend');
  edgeDiv.innerHTML = '';
  Object.entries(EDGE_TYPES).forEach(([key, cfg]) => {
    const div = document.createElement('div');
    div.className = 'edge-legend-item';
    div.style.cursor = 'pointer';
    div.style.opacity = state.edgeTypes[key] ? 1 : 0.3;
    div.innerHTML = `<div class="edge-line" style="background:${cfg.color.replace(/[\d.]+\)/, '1)')}; ${cfg.dash.length ? 'background:repeating-linear-gradient(90deg,' + cfg.color.replace(/[\d.]+\)/, '1)') + ' 0 ' + cfg.dash[0] + 'px, transparent ' + cfg.dash[0] + 'px ' + (cfg.dash[0]+cfg.dash[1]) + 'px)' : ''}"></div>${cfg.label}`;
    div.addEventListener('click', () => {
      state.edgeTypes[key] = !state.edgeTypes[key];
      buildSidebar();
    });
    edgeDiv.appendChild(div);
  });

  // Stats
  const statsDiv = document.getElementById('stats');
  const totalFiles = nodes.length;
  const totalEdges = edges.length;
  const totalExports = nodes.reduce((s, n) => s + n.exports.length, 0);
  const crossEdges = edges.filter(e => e.type === 'cross').length;
  statsDiv.innerHTML = `
    <div class="stat-card"><div class="val">${totalFiles}</div><div class="lbl">Files</div></div>
    <div class="stat-card"><div class="val">${totalEdges}</div><div class="lbl">Dependencies</div></div>
    <div class="stat-card"><div class="val">${totalExports}</div><div class="lbl">Exports</div></div>
    <div class="stat-card"><div class="val">${crossEdges}</div><div class="lbl">Cross-layer</div></div>
  `;

  // Presets
  const presetDiv = document.getElementById('presets');
  presetDiv.innerHTML = '';
  const presets = [
    { id: 'all', label: 'Full System' },
    { id: 'engine', label: 'Engine Only' },
    { id: 'renderer', label: 'Renderer Only' },
    { id: 'ai', label: 'AI Pipeline' },
    { id: 'simulation', label: 'Simulation Flow' },
  ];
  presets.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (state.preset === p.id ? ' active' : '');
    btn.textContent = p.label;
    btn.addEventListener('click', () => applyPreset(p.id));
    presetDiv.appendChild(btn);
  });

  // Comments
  const commentsDiv = document.getElementById('comments');
  const countEl = document.getElementById('comment-count');
  countEl.textContent = state.comments.length ? `(${state.comments.length})` : '';

  if (!state.comments.length) {
    commentsDiv.innerHTML = '<div class="empty-comments">Double-click a node to add comments</div>';
  } else {
    commentsDiv.innerHTML = '';
    state.comments.forEach((c, i) => {
      const div = document.createElement('div');
      div.className = 'comment-item';
      div.innerHTML = `
        <div class="target">${c.targetLabel}</div>
        <div class="body">${c.text}</div>
        <button class="del-btn" data-idx="${i}">&times;</button>
      `;
      div.querySelector('.del-btn').addEventListener('click', () => {
        state.comments.splice(i, 1);
        buildSidebar();
        updatePrompt();
      });
      commentsDiv.appendChild(div);
    });
  }
}

function applyPreset(id) {
  state.preset = id;
  const all = id === 'all';
  state.layers.engine = all || id === 'engine' || id === 'simulation';
  state.layers.renderer = all || id === 'renderer' || id === 'simulation';
  state.layers.ai = all || id === 'ai';
  state.layers.tracks = all || id === 'simulation';
  state.layers.other = all;
  state.layers.entry = all || id === 'simulation';
  state.selected = null;
  buildSidebar();
  updatePrompt();
}


// ═══════════════════════════════════════════════════════════════════
// COMMENT MODAL
// ═══════════════════════════════════════════════════════════════════

let modalTarget = null;

function openModal(node) {
  modalTarget = node;
  document.getElementById('modal-title').textContent = node.label;
  document.getElementById('modal-path').textContent = node.path;
  document.getElementById('modal-text').value = '';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('modal-text').focus(), 50);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalTarget = null;
}

function saveComment() {
  const text = document.getElementById('modal-text').value.trim();
  if (!text || !modalTarget) { closeModal(); return; }
  state.comments.push({
    id: Date.now(),
    target: modalTarget.id,
    targetLabel: modalTarget.label,
    targetFile: modalTarget.path,
    text,
  });
  closeModal();
  buildSidebar();
  updatePrompt();
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});


// ═══════════════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════════════

document.getElementById('search').addEventListener('input', e => {
  state.search = e.target.value;
});


// ═══════════════════════════════════════════════════════════════════
// PROMPT
// ═══════════════════════════════════════════════════════════════════

function updatePrompt() {
  const parts = [];

  // Visible layers
  const visLayers = Object.entries(state.layers).filter(([_, v]) => v).map(([k]) => LAYERS[k].label);
  if (visLayers.length < Object.keys(LAYERS).length) {
    parts.push(`Viewing layers: ${visLayers.join(', ')}.`);
  }

  // Selected node info
  if (state.selected) {
    const n = nodeMap[state.selected];
    if (n) {
      const incoming = edges.filter(e => e.to === n.id).map(e => nodeMap[e.from]?.label).filter(Boolean);
      const outgoing = edges.filter(e => e.from === n.id).map(e => nodeMap[e.to]?.label).filter(Boolean);
      parts.push(`Selected: ${n.label} (${n.path}) — ${n.desc}`);
      if (incoming.length) parts.push(`  Imported by: ${incoming.join(', ')}`);
      if (outgoing.length) parts.push(`  Imports: ${outgoing.join(', ')}`);
    }
  }

  // Comments
  if (state.comments.length) {
    parts.push('');
    parts.push('Feedback on components:');
    state.comments.forEach(c => {
      parts.push(`\n**${c.targetLabel}** (${c.targetFile}):\n${c.text}`);
    });
  }

  const el = document.getElementById('prompt-text');
  el.textContent = parts.length ?
    `Top-Down Racer v02 architecture.\n\n${parts.join('\n')}` :
    'Click nodes to inspect dependencies. Double-click to add comments. Toggle layers in the sidebar.';
}

function copyPrompt() {
  const text = document.getElementById('prompt-text').textContent;
  navigator.clipboard.writeText(text);
  const btn = document.getElementById('copy-btn');
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy Prompt', 1500);
}


// ═══════════════════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════════════════

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('modal-overlay').classList.contains('open')) {
      closeModal();
    } else {
      state.selected = null;
      updatePrompt();
    }
  }
});


// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════

resize();
state.pan = { x: -350, y: -280 };
buildSidebar();
updatePrompt();
animate();
</script>
